<!DOCTYPE html>
<html>
  <head>
    <title>Parcel Sandbox</title>
    <meta charset="UTF-8" />
  </head>

  <body>
    <div id="app">
      <section class="container">
        <article class="tile">
          <figure class="tile__figure">
            <img
              src="assets/background-og.jpeg"
              class="tile__image"
              alt="My image"
              width="300"
            />
            <img
              src="assets/000049.jpeg"
              class="tile__image-overlay"
              alt="My image"
              style="display: none"
            />
          </figure>
        </article>
      </section>

      <canvas id="stage"></canvas>
    </div>

    <script src="src/index.js"></script>
  </body>
</html>
